<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KollectionKards</title>
    <link rel="stylesheet" href="Collection.css">
</head>
<body>

<header>
    <h1>Kollection Kards</h1>
</header>

<main>

  <div id="controls">
    <input id="search" placeholder="Buscar magia..." />

    <section id="painel">
     <p>Total: <span id="total">0</span></p>
     <p>Repetidas: <span id="repetidas">0</span></p>
     <p>Únicas: <span id="unicas">0</span></p>
    </section>

    <div id="filtros">
     <button id="filtroTodos">Todos</button>
     <button id="filtroFav">Favoritos ⭐</button>
     <button id="filtroTrade">Troca 🔄</button>
    </div>
  </div>

     <div id="cards-container"></div>
     </section>
    
</main>

<div id="sidebar" class="sidebar">

  <h2>Adicionar Magia</h2>

  <label>Nome da magia</label>
  <input id="nome" placeholder="Ex: Bola de Fogo">

  <label>URL da imagem</label>
  <input id="imagem" placeholder="https://...">

  <label>Raridade</label>
  <select id="raridade">
    <option>Comum</option>
    <option>Rara</option>
    <option>Épica</option>
  </select>

  <div class="checkbox">
  <input type="checkbox" id="repetido">
  <label for="repetido">Marcar como repetida</label>
  </div>

  <button id="addCard">Adicionar</button>
  <button id="closeSidebar">Fechar</button>

</div>

<script src="Collection.js"></script>
</body>
</html>
